name: cat_talk
description: 貓語翻譯 App - 讓每一聲喵喵都被聽見

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.0
  flutter_sound: ^9.10.4
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  camera: ^0.11.0+2
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  http: ^1.2.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  equatable: ^2.0.5
  in_app_review: ^2.0.2
  google_mlkit_pose_detection: ^0.12.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
